services:
  devops-group-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops-group-api:latest
    container_name: devops-group-api
    ports:
      - "8000:8000"
    networks:
      - cicd-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  cicd-network:
    external: true